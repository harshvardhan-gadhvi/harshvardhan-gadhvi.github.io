<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page Not Found — Harshvardhan Gadhvi</title>
  <meta http-equiv="refresh" content="5;url=/">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Mono:wght@300&display=swap" rel="stylesheet">
  <style>
    body {
      background: #12100e; color: #f4efe4;
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 2rem;
    }
    .wrap { max-width: 480px; }
    .num { font-size: 8rem; font-weight: 300; color: #c4922a; line-height: 1; }
    h1 { font-size: 2rem; font-weight: 300; font-style: italic; margin: 1rem 0; }
    p { color: rgba(244,239,228,0.5); font-size: 1rem; line-height: 1.7; margin-bottom: 2rem; }
    a {
      font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: #f4efe4; text-decoration: none;
      border: 1px solid rgba(244,239,228,0.3); padding: 0.8rem 2rem;
      transition: border-color 0.2s;
    }
    a:hover { border-color: #c4922a; color: #c4922a; }
    .redirect { margin-top: 1.5rem; font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; color: rgba(244,239,228,0.3); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="num">404</div>
    <h1>Lost in the shadows.</h1>
    <p>This page doesn't exist — but the story continues. You'll be redirected home in 5 seconds.</p>
    <a href="/">Return Home</a>
    <p class="redirect">Redirecting automatically…</p>
  </div>
</body>
</html>
